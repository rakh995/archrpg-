<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ArchRPG — Computer Architecture Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1> ArchRPG</h1>
    <p>Квест: Достигни 70% Cache Hit Rate</p>

    <div class="game-box">
        <label>Размер кэша:</label>
        <input type="number" id="cacheSize" value="3" min="1" max="10">

        <label>Адреса памяти (через пробел):</label>
        <input type="text" id="addresses" placeholder="1 2 3 1 2 4">

        <button onclick="startGame()">Запустить симуляцию</button>

        <div class="cache-visual">
            <h3>Кэш</h3>
            <div id="cacheBlocks"></div>
        </div>

        <div class="progress-bar">
            <label>Cache Hit Rate:</label>
            <div class="progress-container">
                <div id="hitRateBar" class="progress-fill"></div>
            </div>
        </div>

        <div id="output"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
